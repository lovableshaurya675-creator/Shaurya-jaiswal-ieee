<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Clone Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="main">
    <span>crypko❤</span>
    <nav>
        <ul>
            <li><a href="#">Guideline</a></li>
            <li><a href="#">Faq</a></li>
            <li><a href="#">Contact us</a></li>
            <li><a href="#">Discord</a></li>
            <li><a href="#">Twitter</a></li>
        </ul>
        <button class="join">Join Us</button>
    </nav>
    <h1>
        ANIME CHARACTER <br>GENERATION
    </h1>
    <img class="animebottom" src="./anime bottom.jpg" width="380px" alt="anime boys">
    <button  class="create">🎲 <br>CREATE ANIME</button>

    
    <div class="right-card">
        <img src="./anime_right.jpg" alt="anime girl" class="right-img">
        <div class="yellow-bar">
            <span class="star-icon">★</span>
            <span class="star-icon">★</span>
            <span class="arrow-icon">↑</span>
        </div>
    </div>

    
    <div class="circle-badge">
        <svg class="circle-svg" viewBox="0 0 140 140">
            <defs>
                <path id="textCircle" d="M 70,70 m -52,0 a 52,52 0 1,1 104,0 a 52,52 0 1,1 -104,0"/>
            </defs>
            <text font-size="9" font-family="Arial" fill="#333" letter-spacing="2" font-weight="500">
                <textPath href="#textCircle">
                     OFFICIAL RELEASE · ANIME CHARACTER GENERATION · 
                </textPath>
            </text>
        </svg>
        <button class="start-btn">START<br>GENERATE</button>
    </div>


    <div class="info-card">
        <div class="info-top">
            <p class="info-title">SMARTPHONE APP MEMES</p>
            <div class="dots">
                <span></span><span></span><span></span>
            </div>
        </div>
        <p class="info-desc">The smartphone application MEMES, where Crypko serves as the core technology behind, is now available in Apple App Store &amp; Google Play.</p>
        <div class="info-bottom">
            <div class="app-btns">
                <button class="app-icon">A</button>
                <button class="app-icon">▶</button>
            </div>
            <button class="download-btn">Download ↓</button>
        </div>
    </div>

   </div>
    <script src="script.js"></script>
</body>
</html>
